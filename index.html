<!DOCTYPE html>
<html>
<head>
  <title>Infinity</title>
  <meta charset="UTF-8">
  <script src="/source/js/head.js"></script>
</head>
<body>
  <!-- header 开始 -->
  <script src="/source/js/header.js"></script>
  <!-- header 结束 -->
  
  
  <div id="main_box" class="box">
    <h1 style="text-align:center; font-size:4rem;">Articles</h1>
	</div>
  
  <script>

    document.addEventListener('DOMContentLoaded', getArticles());

    function getArticles() {
      var i = 0, before = null, parentNode = document.getElementById('main_box');
      while(true) {
        var name = '/articles/' + String(i) + '.md';
        var x = loadFile(name);
        if(x == 'ERR') {
          break;
        }
        var y = marked(x);
        var ele = document.createElement('div');
        ele.className = 'markdown-body';
        ele.style.border = '1px solid black';
        ele.style.borderRadius = '2rem';
        ele.style.padding = '1rem';
        ele.style.marginBottom = '1rem';
        ele.innerHTML = y;
        if(before == null) {
          parentNode.appendChild(ele);
        }
        else {
          parentNode.insertBefore(ele, before);
        }
        before = parentNode.childNodes[2];
        i = i + 1;
      }
      if(i == 0) {
        document.getElementById('main_box').innerHTML = '<h1>一篇文章都没有...</h1>';
      }
    }

    function loadFile(filePath) {
        var result = 'ERR';
        var xmlhttp = new XMLHttpRequest();
        xmlhttp.open("GET", filePath, false);
        xmlhttp.send();
        if (xmlhttp.status==200) {
            result = xmlhttp.responseText;
        }
        return result;
    }

  </script>
  
  <div id="sidebar" class="box">
    <h2>Friends</h2>
    <a href="https://disviel.github.io" target="_blank" class="round_button">disviel</a>
    <a href="https://butterflydew.github.io" target="_blank" class="round_button">dew</a> 
  </div>
  
  <!-- footer开始 -->
  <script src="/source/js/footer.js"></script>
  <!-- footer结束 -->
</body>
</html>
